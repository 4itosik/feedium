server:
  http:
    addr: 0.0.0.0:8000
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 10s
data:
  database:
    host: 127.0.0.1
    port: 5432
    database: feedium
    user: feedium
    password: feedium
    sslmode: disable
summary:
  worker:
    poll_interval: 5s
    concurrency: 4 # увеличить под нагрузку; ограничено LLM rate limits и БД connection pool
    lease_ttl: 5m
    heartbeat_interval: 1m
    graceful_timeout: 10s
    max_attempts: 5
    backoff_base: 10s
    backoff_max: 10m
  source_scheduler:
    poll_interval: 5s
  reaper:
    interval: 1m
    grace: 30s
  cron:
    interval: 1h
  llm:
    timeout: 30s
    max_retries: 3
    provider: openrouter
    providers:
      openrouter:
        api_key: "YOUR_OPENROUTER_API_KEY"
        base_url: "https://openrouter.ai/api/v1"
        model: "openai/gpt-4o-mini"
  cumulative:
    max_window: 72h
    max_input_chars: 50000
  outbox:
    event_ttl: 24h
