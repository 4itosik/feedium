server:
  http:
    addr: 0.0.0.0:8000
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 10s
data:
  database:
    host: 127.0.0.1
    port: 5432
    database: feedium
    user: feedium
    password: feedium
    sslmode: disable
summary:
  worker:
    poll_interval: 5s
    concurrency: 2
    lease_ttl: 300s
    heartbeat_interval: 60s
    graceful_timeout: 10s
    max_attempts: 3
    backoff_base: 10s
    backoff_max: 600s
  source_scheduler:
    poll_interval: 5s
  reaper:
    interval: 60s
    grace: 30s
  cron:
    interval: 3600s
  llm:
    timeout: 30s
    max_retries: 3
    provider: openrouter
    providers:
      openrouter:
        api_key: "REPLACE_WITH_YOUR_OPENROUTER_API_KEY"
        base_url: "https://openrouter.ai/api/v1"
        model: "openai/gpt-4o-mini"
  cumulative:
    max_window: 259200s
    max_input_chars: 50000
  outbox:
    event_ttl: 86400s
