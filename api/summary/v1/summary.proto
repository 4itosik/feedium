syntax = "proto3";

package summary.v1;

option go_package = "feedium/api/summary/v1;summaryv1";

import "google/protobuf/timestamp.proto";

// Summary represents a generated summary of one or more posts.
message Summary {
  string id = 1;
  string source_id = 2;
  string event_id = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  repeated string post_ids = 6;
}

// GetSummaryByPostRequest requests a summary by post ID.
message GetSummaryByPostRequest {
  string post_id = 1;
}

// GetSummaryByPostResponse returns a summary for a specific post.
message GetSummaryByPostResponse {
  Summary summary = 1;
}

// ListSummariesBySourceRequest requests a list of summaries.
message ListSummariesBySourceRequest {
  // Optional source ID filter. If not provided, returns summaries from all sources.
  string source_id = 1;
  // Maximum number of summaries to return. Must be > 0 and <= 100.
  int32 limit = 2;
}

// ListSummariesBySourceResponse returns a list of summaries.
message ListSummariesBySourceResponse {
  repeated Summary summaries = 1;
}

service SummaryService {
  // GetSummaryByPost retrieves a summary by its associated post ID.
  // Returns NOT_FOUND if the post has no summary yet.
  rpc GetSummaryByPost(GetSummaryByPostRequest) returns (GetSummaryByPostResponse);

  // ListSummariesBySource retrieves summaries, optionally filtered by source.
  // Results are ordered by created_at DESC (newest first).
  rpc ListSummariesBySource(ListSummariesBySourceRequest) returns (ListSummariesBySourceResponse);
}
