syntax = "proto3";

package conf;

option go_package = "github.com/4itosik/feedium/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
}

message Server {
  HTTP http = 1;
  GRPC grpc = 2;
}

message HTTP {
  string addr = 1;
  google.protobuf.Duration timeout = 2;
}

message GRPC {
  string addr = 1;
  google.protobuf.Duration timeout = 2;
}
