syntax = "proto3";

package conf;

option go_package = "github.com/4itosik/feedium/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Summary summary = 3;
}

message Server {
  HTTP http = 1;
  GRPC grpc = 2;
}

message HTTP {
  string addr = 1;
  google.protobuf.Duration timeout = 2;
}

message GRPC {
  string addr = 1;
  google.protobuf.Duration timeout = 2;
}

message Data {
  Database database = 1;
}

message Database {
  string host = 1;
  int32 port = 2;
  string database = 3;
  string user = 4;
  string password = 5;
  string sslmode = 6;
}

message Summary {
  SummaryWorker worker = 1;
  SummaryCron cron = 2;
  SummaryLLM llm = 3;
  SummaryCumulative cumulative = 4;
  SummaryOutbox outbox = 5;
  SummarySourceScheduler source_scheduler = 6;
  SummaryReaper reaper = 7;
}

message SummaryWorker {
  google.protobuf.Duration poll_interval = 1;
  int32 concurrency = 3;
  google.protobuf.Duration lease_ttl = 4;
  google.protobuf.Duration heartbeat_interval = 5;
  google.protobuf.Duration graceful_timeout = 6;
  int32 max_attempts = 7;
  google.protobuf.Duration backoff_base = 8;
  google.protobuf.Duration backoff_max = 9;
}

message SummaryCron {
  google.protobuf.Duration interval = 1;
}

message SummarySourceScheduler {
  google.protobuf.Duration poll_interval = 2;
}

message SummaryReaper {
  google.protobuf.Duration interval = 1;
  google.protobuf.Duration grace = 2;
}

message SummaryLLM {
  google.protobuf.Duration timeout = 1;
  int32 max_retries = 2;
  string provider = 3;
  map<string, SummaryLLMProvider> providers = 4;
}

message SummaryLLMProvider {
  string api_key = 1;
  string base_url = 2;
  string model = 3;
}

message SummaryCumulative {
  google.protobuf.Duration max_window = 1;
  int32 max_input_chars = 2;
}

message SummaryOutbox {
  google.protobuf.Duration event_ttl = 1;
}
